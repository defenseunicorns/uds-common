name: Callable-Auto-Merge-Checks

on:
  workflow_call:
    inputs:
      udsCliVersion:
        description: The uds-cli version to install
        # renovate: datasource=github-tags depName=defenseunicorns/uds-cli versioning=semver
        default: 0.27.15
        type: string
      packagePrefix:
        description: The prefix for public packages
        default: ""
        type: string
      privatePackagePrefix:
        description: The prefix for private packages
        default: private
        type: string
      excludes:
        description: Comma separated list of image name patterns to exclude (match name or substring)
        default: ""
        type: string
      nameRewriteSed:
        description: Comma separated list of sed -E expressions to rewrite image names
        default: ""
        type: string
      allowPatchMismatch:
        description: Collapse tags to major.minor before comparison
        default: false
        type: string

permissions:
  contents: read
  packages: read
  pull-requests: write

concurrency:
  group: scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-flavors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install UDS CLI
        uses: defenseunicorns/setup-uds@ab842abcad1f7a3305c2538e3dd1950d0daacfa5 # v1.0.1
        with:
          version: v${{ inputs.udsCliVersion }}

      - name: Environment setup
        shell: bash
        run: |
          echo 'MARU_AUTH={"raw.githubusercontent.com":"${{ secrets.GITHUB_TOKEN }}"}' >> "$GITHUB_ENV"
          uds run actions:setup-environment \
            --set REGISTRY1_USERNAME="${{ secrets.IRON_BANK_ROBOT_USERNAME }}" \
            --set REGISTRY1_PASSWORD="${{ secrets.IRON_BANK_ROBOT_PASSWORD }}" \
            --set GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            --set RAPIDFORT_USERNAME="${{ secrets.RAPIDFORT_USERNAME }}" \
            --set RAPIDFORT_PASSWORD="${{ secrets.RAPIDFORT_PASSWORD }}"

      - name: Write helpers (used by both checks)
        shell: bash
        env:
          EXCLUDES: ${{ inputs.excludes }}
          NAME_REWRITE_SED: ${{ inputs.nameRewriteSed }}
        run: |
          set -euo pipefail
          LIB="$RUNNER_TEMP/ci-helpers.sh"
          cat > "$LIB" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          : "${ZARF_YAML:=zarf.yaml}"

          # CSV → array (whitespace tolerant)
          to_array() {
            local __name="$1" __raw="${2:-}"
            if [[ -n "$__raw" ]]; then
              IFS=',' read -r -a "$__name" <<< "$(printf '%s' "$__raw" | sed 's/[[:space:]]*,[[:space:]]*/,/g')"
            else
              eval "$__name=()"
            fi
          }

          # Build arrays once; callers just set EXCLUDES/NAME_REWRITE_SED before sourcing if they want overrides
          to_array EXCLUDE_PATS "${EXCLUDES:-}"
          to_array NAME_SED     "${NAME_REWRITE_SED:-}"

          # Normalize "name:tag" (optional sed rewrites; optional collapse patch)
          # normalize_image "<name:tag>" "<collapse:true|false>"
          normalize_image() {
            local full="$1" collapse="${2:-false}"
            local name="${full%%:*}"
            local tag="${full#*:}"

            local n="$name"
            for expr in "${NAME_SED[@]:-}"; do
              [[ -n "$expr" ]] && n="$(printf '%s' "$n" | sed -E "$expr")"
            done

            tag="${tag#v}"; tag="${tag#V}"   # drop leading v/V
            tag="${tag%%-*}"                # drop build suffix

            if [[ "$collapse" == "true" ]]; then
              if [[ "$tag" =~ ^([0-9]+)\.([0-9]+)\.[0-9A-Za-z]+$ ]]; then
                tag="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
              fi
            fi

            printf '%s:%s\n' "$n" "$tag"
          }

          # Exclusions: exact "name:tag" or name/substring
          is_excluded() {
            local full="$1" nm="${full%%:*}"
            for pat in "${EXCLUDE_PATS[@]:-}"; do
              [[ -z "$pat" ]] && continue
              if [[ "$pat" == *:* ]]; then
                [[ "$full" == "$pat" ]] && return 0
              else
                [[ "$nm" == "$pat" || "$nm" == *"$pat"* ]] && return 0
              fi
            done
            return 1
          }

          # yq program as a plain string (expects FLAVOR in env)
          YQ_IMAGE_FILTER='.components[]
          | select((.only.flavor|type=="!!str") and .only.flavor == env(FLAVOR))
          | .images[]?
          | sub("^.*/"; "")
          | capture("(?<name>[^:]+):(?<tag>.*)")
          | .tag |= sub("-.*$"; "")
          | .tag |= sub("^[vV]"; "")
          | "\(.name):\(.tag)"'

          discover_flavors() {
            uds zarf tools yq -r '.components[].only.flavor | select(. != null)' "$ZARF_YAML" | sort -u
          }

          # Emit normalized images for a flavor
          flavor_images_normalized() {
            local flavor="$1" collapse="${2:-false}"
            FLAVOR="$flavor" uds zarf tools yq -r "$YQ_IMAGE_FILTER" "$ZARF_YAML" \
              | while IFS= read -r img; do
                  [[ -z "$img" ]] && continue
                  img="$(normalize_image "$img" "$collapse")"
                  is_excluded "$img" && continue
                  printf '%s\n' "$img"
                done
          }

          # Emit normalized images discovered via find-images in common/
          find_images_normalized() {
            local common_dir="$1" collapse="${2:-false}"
            uds zarf dev find-images "$common_dir" \
              | uds zarf tools yq -r '.components[].images[]' \
              | while IFS= read -r img; do
                  [[ -z "$img" ]] && continue
                  local base="${img##*/}"
                  [[ "$base" == *:* ]] || continue
                  local norm
                  norm="$(normalize_image "$base" "$collapse")"
                  is_excluded "$norm" && continue
                  printf '%s\n' "$norm"
                done
          }
          EOF
          chmod +x "$LIB"
          echo "CI_HELPERS=$LIB" >> "$GITHUB_ENV"

      # ---------------------------
      # Check Image Flavors
      # ---------------------------
      - name: Check Image Flavors
        id: check-image-flavors
        shell: bash
        env:
          EXCLUDES: ${{ inputs.excludes }}
          NAME_REWRITE_SED: ${{ inputs.nameRewriteSed }}
        run: |
          set -euo pipefail
          source "$CI_HELPERS"

          ZARF_YAML="zarf.yaml"
          if [[ ! -f "$ZARF_YAML" ]]; then
            echo "No zarf.yaml found, skipping..."
            echo "No zarf.yaml found, skipping..." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          FLAVORS="$(discover_flavors)"
          if [[ -z "$FLAVORS" ]]; then
            echo "No flavors found."
            echo "No flavors found in releaser.yaml." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          tmpdir="$(mktemp -d)"; trap 'rm -rf "'"$tmpdir"'"' EXIT
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            flavor_images_normalized "$f" false | sort -u > "${tmpdir}/${f}.txt" || true
          done <<< "$FLAVORS"

          failures=0
          while IFS= read -r src; do
            [[ -z "$src" ]] && continue
            src_file="${tmpdir}/${src}.txt"
            [[ -s "$src_file" ]] || continue
            while IFS= read -r img; do
              [[ -z "$img" ]] && continue
              is_excluded "$img" && continue
              found=false
              while IFS= read -r tgt; do
                [[ -z "$tgt" || "$tgt" == "$src" ]] && continue
                tgt_file="${tmpdir}/${tgt}.txt"
                [[ -s "$tgt_file" ]] && grep -Fxq -- "$img" "$tgt_file" && { found=true; break; }
              done <<< "$FLAVORS"
              $found || { printf 'MISMATCH [%s] %s\n' "$src" "$img"; failures=$((failures+1)); }
            done < "$src_file"
          done <<< "$FLAVORS"

          if (( failures > 0 )); then
            printf 'RESULT: FAIL (%d mismatch%s)\n' "$failures" "$([[ $failures -eq 1 ]] && echo "" || echo "es")"
            exit 1
          else
            echo 'RESULT: OK'
          fi

      # ---------------------------
      # Check Chart Flavors (vs common/) with optional patch collapse
      # ---------------------------
      - name: Check Chart Flavors
        id: check-chart-flavors
        shell: bash
        env:
          EXCLUDES: ${{ inputs.excludes }}
          NAME_REWRITE_SED: ${{ inputs.nameRewriteSed }}
          ALLOW_PATCH_MISMATCH: ${{ inputs.allowPatchMismatch }}
        run: |
          set -euo pipefail
          source "$CI_HELPERS"

          ZARF_YAML="zarf.yaml"
          COMMON_PATH="${GITHUB_WORKSPACE}/common"

          if [[ ! -f "$ZARF_YAML" ]]; then
            echo "No zarf.yaml found, skipping..."
            echo "No zarf.yaml found, skipping..." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [[ ! -d "$COMMON_PATH" ]]; then
            echo "No common/ directory found, skipping..."
            echo "No common/ directory found, skipping..." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          tmpdir="$(mktemp -d)"; trap 'rm -rf "'"$tmpdir"'"' EXIT

          find_images_normalized "$COMMON_PATH" "${ALLOW_PATCH_MISMATCH}" | sort -u > "${tmpdir}/found.txt"

          FLAVORS="$(discover_flavors)"
          if [[ -z "$FLAVORS" ]]; then
            echo "No flavors found."
            echo "No flavors found in zarf.yaml." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          failures=0
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            flavor_images_normalized "$f" "${ALLOW_PATCH_MISMATCH}" | sort -u > "${tmpdir}/flavor_${f}.txt" || true

            comm -23 "${tmpdir}/found.txt"  "${tmpdir}/flavor_${f}.txt" > "${tmpdir}/only_in_found_${f}.txt"  || true
            comm -13 "${tmpdir}/found.txt"  "${tmpdir}/flavor_${f}.txt" > "${tmpdir}/only_in_flavor_${f}.txt" || true

            had_fail=0
            if [[ -s "${tmpdir}/only_in_found_${f}.txt" ]]; then
              while IFS= read -r img; do
                [[ -z "$img" ]] && continue
                printf 'FAIL [%s] missing in zarf.yaml: %s\n' "$f" "$img"
                failures=$((failures+1)); had_fail=1
              done < "${tmpdir}/only_in_found_${f}.txt"
            fi
            if [[ -s "${tmpdir}/only_in_flavor_${f}.txt" ]]; then
              while IFS= read -r img; do
                [[ -z "$img" ]] && continue
                printf 'FAIL [%s] missing in find-images: %s\n' "$f" "$img"
                failures=$((failures+1)); had_fail=1
              done < "${tmpdir}/only_in_flavor_${f}.txt"
            fi
            [[ "$had_fail" -eq 0 ]] && printf 'OK   [%s] sets match\n' "$f"
          done <<< "$FLAVORS"

          if (( failures > 0 )); then
            printf 'RESULT: FAIL (%d mismatch%s)\n' "$failures" "$([[ $failures -eq 1 ]] && echo "" || echo "es")"
            exit 1
          else
            echo 'RESULT: OK'
          fi
name: callable-auto-update
    # Scan the sboms in the package, and compare to the current upstream images of the same tag. If
    # there are less cves in any image and no images have more cves, then bump the uds version to trigger
    # a new release.

on:
  workflow_call:
    inputs:
      udsCliVersion:
        description: The uds-cli version to install
        # renovate: datasource=github-tags depName=defenseunicorns/uds-cli versioning=semver
        default: 0.27.6
        type: string
      zarfYamlPath:
        description: The path to the zarf.yaml file
        default: zarf.yaml
        type: string
      packagePrefix:
        description: The prefix for public packages
        default: ""
        type: string
      privatePackagePrefix:
        description: The prefix for private packages
        default: private
        type: string
      dry-run:
        description: Enable dry-run mode, which doesn't commits changes to the repository.
        default: false
        type: boolean

# Permissions for the GITHUB_TOKEN used by the workflow.
permissions:
  contents: write # Allows us to read files from the repository for scanning, and writing the bumped releaser.yaml if applicable.
  packages: read  # Allows us to pull the sboms from the published packages for comparison.

jobs:
  get-flavors:
    runs-on: ubuntu-latest
    outputs:
      flavors: ${{ steps.get-flavors.outputs.flavors }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get flavors
        id: get-flavors
        run: |
          FLAVORS="$(yq -o=json -I=0 '[.components[].only.flavor | select(. != null)] | unique' '${{ inputs.zarfYamlPath }}')"
          echo "flavors=${FLAVORS}" >> "$GITHUB_OUTPUT"

  scan-flavor:
    needs: get-flavors
    strategy:
      matrix:
        flavor: ${{ fromJson(needs.get-flavors.outputs.flavors) }}
    uses: ./.github/workflows/callable-auto-update-flavor.yaml
    secrets: inherit
    with:
      udsCliVersion: ${{ inputs.udsCliVersion }}
      zarfYamlPath: ${{ inputs.zarfYamlPath }}
      packagePrefix: ${{ inputs.packagePrefix }}
      privatePackagePrefix: ${{ inputs.privatePackagePrefix }}
      flavor: ${{ matrix.flavor }}

  commit-changes:
    runs-on: ubuntu-latest
    needs: scan-flavor
    steps:
      - name: Download Scan Results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: bump-status
          pattern: bump-*

      - name: Check if any flavors need to be bumped
        id: decide-bump
        run: |
          mkdir -p bump-status
          UPDATES=$(ls -1 bump-status/)
          if [ -z "$UPDATES" ]; then
            echo "No updates found."
            echo "bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "Updates found:"
            echo "${UPDATES}"
            echo "bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: ${{ steps.decide-bump.outputs.bump == 'true' }}

      - name: Bump versions in releaser.yaml
        if: ${{ steps.decide-bump.outputs.bump == 'true' }}
        run: |
          echo "Bumping versions in releaser.yaml"

          set -Eeuo pipefail
          set -x

          yq --version
          # Sanity check the YAML parses at all
          yq e 'true' releaser.yaml >/dev/null

          # Optional: list flavors found in releaser.yaml
          yq e -r '.flavors[].name' releaser.yaml || true

          ls -la bump-status || true

          for update in bump-status/*; do
            # Handle empty dir cleanly
            [ -e "$update" ] || { echo "No bump-status entries"; break; }

            flavor="$(basename "$update" | cut -d '-' -f 1)"
            export flavor
            echo "Processing flavor=${flavor}"

            # Read current version (raw)
            version="$(yq e -r '.flavors[] | select(.name == strenv(flavor)) | .version' releaser.yaml || true)"
            echo "Current version for ${flavor}: '${version}'"

            # Guard: skip if not found
            if [ -z "${version}" ] || ! [[ "${version}" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
              echo "Skip: no valid version for flavor ${flavor}"
              continue
            fi

            main_version="${version%.*}"
            uds_version="${version##*.}"
            new_version="${main_version}.$((uds_version + 1))"
            export new_version
            echo "New version for ${flavor}: '${new_version}'"

            # In-place update; use strenv() so YAML parser doesn't choke on env value
            yq e -i '
              (.flavors[]
                | select(.name == strenv(flavor))
                | .version
              ) = strenv(new_version)
            ' releaser.yaml
          done

          set +x
          echo "New releaser.yaml:"
          cat releaser.yaml

      - name: Commit and push changes
        if: ${{ steps.decide-bump.outputs.bump == 'true' && inputs.dry-run != 'false' }}
        run: |
          UPDATES="$(find bump-status/ -type f -print0 | xargs -0 cat)"
          git config --local user.name "Defense Unicorns"
          git config --local user.email "doug-defense-unicorns@users.noreply.github.com"
          git add releaser.yaml
          git commit -m "chore(images): update due to rebuilt images being more secure" -m "${UPDATES}"
          git push
